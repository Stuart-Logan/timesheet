<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SDL Timesheets</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+PHJlY3Qgd2lkdGg9IjMyIiBoZWlnaHQ9IjMyIiByeD0iNiIgZmlsbD0iI2YwYTUwMCIvPjx0ZXh0IHg9IjE2IiB5PSIyMyIgZm9udC1mYW1pbHk9Im1vbm9zcGFjZSIgZm9udC13ZWlnaHQ9ImJvbGQiIGZvbnQtc2l6ZT0iMTgiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZpbGw9IiMwMDAiPkUzPC90ZXh0Pjwvc3ZnPg==">

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0e14;--bg2:#111520;--bg3:#181d2a;--bg4:#1e2436;
  --border:#232940;--border2:#2e3650;
  --text:#dde3f0;--text2:#8891aa;--text3:#555e78;
  --amber:#f0a500;--adim:rgba(240,165,0,.15);--abd:rgba(240,165,0,.3);
  --green:#22c55e;--gdim:rgba(34,197,94,.15);--gbd:rgba(34,197,94,.3);
  --red:#ef4444;--rdim:rgba(239,68,68,.15);--rbd:rgba(239,68,68,.3);
  --teal:#06b6d4;--tdim:rgba(6,182,212,.12);--tbd:rgba(6,182,212,.3);
  --purple:#a78bfa;--pdim:rgba(167,139,250,.15);--pbd:rgba(167,139,250,.3);
  --blue:#3b82f6;
  --RD:#f59e0b;--RDdim:rgba(245,158,11,.18);--RDbd:rgba(245,158,11,.4);
  --PD:#818cf8;--PDdim:rgba(129,140,248,.18);--PDbd:rgba(129,140,248,.4);
  --font:'IBM Plex Sans',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --hh:44px; /* header height — used in JS scroll calc */
}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;min-height:100vh}
body.light{
  --bg:#f0f2f7;--bg2:#fff;--bg3:#e8eaef;--bg4:#dde0e8;
  --border:#c8ccd8;--border2:#b0b5c4;
  --text:#1a1f2e;--text2:#4a5068;--text3:#8891aa;
  --amber:#b45309;--adim:#fef3c7;--abd:#f59e0b;
  --green:#15803d;--gdim:#dcfce7;--gbd:#22c55e;
  --red:#b91c1c;--rdim:#fee2e2;--rbd:#ef4444;
  --teal:#0e7490;--tdim:#cffafe;--tbd:#06b6d4;
  --purple:#6d28d9;--pdim:#ede9fe;--pbd:#a78bfa;
  --RD:#92400e;--RDdim:#fef3c7;--RDbd:#f59e0b;
  --PD:#4338ca;--PDdim:#e0e7ff;--PDbd:#818cf8;
}

/* ── FIXED HEADER ── */
#hdr{
  position:sticky;top:0;left:0;right:0;z-index:999;
  background:var(--bg2);border-bottom:1px solid var(--border);
  height:var(--hh);display:flex;align-items:center;padding:0 16px;gap:8px;
}
#hdr .logo{font-weight:600;font-size:14px;margin-right:8px}
#hdr .logo span{color:var(--amber)}
.btn{background:transparent;border:1px solid var(--border2);color:var(--text2);
  padding:3px 10px;border-radius:4px;font-size:11px;cursor:pointer;font-family:var(--font)}
.btn:hover{background:var(--bg3);color:var(--text)}
.btn-now{border-color:var(--tbd);color:var(--teal)}
.btn-now:hover{background:var(--tdim)}
.yr-btns{display:flex;gap:2px;margin-left:4px}
.yr-btn{background:none;border:none;color:var(--text3);padding:2px 8px;font-size:12px;
  cursor:pointer;font-family:var(--font);border-radius:3px}
.yr-btn:hover{color:var(--text2);background:var(--bg3)}
.yr-btn.on{color:var(--amber);font-weight:600;background:var(--adim)}
.hdr-right{margin-left:auto;display:flex;gap:4px;align-items:center}

/* ── MAIN — padded below fixed header ── */
#main{padding-top:8px;max-width:1060px;margin:0 auto;padding-left:16px;padding-right:16px;padding-bottom:60px}

/* ── HERO CARDS ── */
.hero-grid{display:grid;grid-template-columns:170px 1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.hcard{background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:12px 14px;position:relative}
.hcard::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;border-radius:0 0 7px 7px;background:var(--hc,var(--border))}
.hcard-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);font-weight:600;margin-bottom:4px}
.hcard-val{font-size:28px;font-weight:300;font-family:var(--mono);letter-spacing:-1px;line-height:1}
.hcard-days{font-size:11px;font-weight:500;margin-top:2px}
.hcard-sub{font-size:10px;color:var(--text3);margin-top:2px}
.wk-id-lbl{font-size:10px;font-weight:600;color:var(--teal);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.wk-id-dates{font-size:12px;color:var(--text2);line-height:1.5}
.proj-chips{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.pchip{font-size:10px;font-weight:600;font-family:var(--mono);padding:1px 6px;border-radius:3px}
.pchip-rd{background:var(--RDdim);color:var(--RD);border:1px solid var(--RDbd)}
.pchip-pd{background:var(--PDdim);color:var(--PD);border:1px solid var(--PDbd)}

/* ── STATS ── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.scard{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:9px 12px}
.scard-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:2px}
.scard-val{font-size:17px;font-weight:500;font-family:var(--mono)}
.scard-sub{font-size:10px;color:var(--text3)}

/* ── CHART ── */
.chart-box{background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:12px 14px 8px;margin-bottom:12px}
.chart-c{position:relative;height:180px}
.chart-leg{display:flex;gap:10px;margin-top:7px;border-top:1px solid var(--border);padding-top:6px;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--text3)}
.leg-dot{width:6px;height:6px;border-radius:1px;flex-shrink:0}

/* ── WEEK SECTION ── */
.wk-section-hdr{font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);
  padding:6px 0;border-bottom:1px solid var(--border);margin-bottom:8px}

/* ── WEEK CARD ── */
.wk{background:var(--bg2);border:1px solid var(--border);border-radius:7px;margin-bottom:6px;overflow:hidden}
.chv{font-size:9px;color:var(--text3);width:10px;flex-shrink:0}
.wk-body.closed{display:none}
.wk.now{border-color:var(--tbd);box-shadow:0 0 0 1px var(--tbd)}
.wk-hdr{padding:7px 12px;display:flex;align-items:center;gap:8px;background:var(--bg3);border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
.wk.now .wk-hdr{background:var(--tdim);border-left:3px solid var(--teal)}
.wk-num{font-size:10px;font-weight:700;font-family:var(--mono);
  padding:2px 6px;border-radius:3px;background:var(--bg4);color:var(--text2)}
.wk.now .wk-num{background:var(--tdim);color:var(--teal);border:1px solid var(--tbd)}
.wk-range{font-size:11px;color:var(--text3)}
.wk-sum{margin-left:auto;font-size:10px;font-family:var(--mono);color:var(--text3)}
.wk-proj-mini{display:flex;gap:4px;font-size:9px;font-family:var(--mono)}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto}
table.wt{width:100%;border-collapse:collapse;font-size:11px;table-layout:fixed}
table.wt th,table.wt td{border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
table.wt tr:last-child td{border-bottom:none}
table.wt th:last-child,table.wt td:last-child{border-right:none}
.rlbl{width:54px;padding:4px 8px;font-size:9px;color:var(--text3);background:var(--bg3);
  text-align:right;font-weight:500;white-space:nowrap}
.dhd{padding:4px 2px;text-align:center;font-size:10px;font-weight:600;background:var(--bg3);color:var(--text2)}
.dhd.wknd{color:var(--text3)}
.dhd.today{color:var(--teal);background:var(--tdim)}
.dtd{padding:2px 2px;text-align:center;background:var(--bg2)}
.dtd.wknd{background:var(--bg3)}
.dtd.today{background:var(--tdim)}
.dtd.fl-hol{background:rgba(6,182,212,.08)}
.dtd.fl-plan{background:rgba(167,139,250,.08)}

/* time inputs */
.ti{background:transparent;border:none;color:var(--text);font-family:var(--mono);
  font-size:11px;width:100%;text-align:center;padding:3px 0;outline:none;caret-color:var(--amber)}
.ti::placeholder{color:var(--border2)}
.ti:focus{color:var(--amber);background:var(--adim);border-radius:2px}
.dtd.today .ti{color:var(--text)}
.dtd.today .ti:focus{color:var(--amber)}
.ti.hol{color:var(--teal)}
.ti.plan{color:var(--purple)}

/* hours display */
.hrs{font-family:var(--mono);font-size:11px;display:inline-block;min-width:32px}
.hrs.pos{color:var(--green)}.hrs.neg{color:var(--red)}
.hrs.hol{color:var(--teal)}.hrs.plan{color:var(--purple)}.hrs.mt{color:var(--text3)}

/* flag buttons */
.fl{background:transparent;border:1px solid var(--border2);color:var(--text3);
  font-size:9px;font-weight:700;width:17px;height:15px;border-radius:2px;cursor:pointer;
  line-height:1;font-family:var(--font);padding:0}
.fl:hover{border-color:var(--text2);color:var(--text)}
.fl.hol{background:var(--tdim);border-color:var(--tbd);color:var(--teal)}
.fl.plan{background:var(--pdim);border-color:var(--pbd);color:var(--purple)}

/* project pair */
.proj-td{padding:1px 2px!important}
.proj-pair{display:flex;flex-direction:column;gap:1px}
.proj-row{display:flex;align-items:center;gap:2px;padding:1px 2px}
.proj-row.rd{border-left:2px solid var(--RDbd)}
.proj-row.pd{border-left:2px solid var(--PDbd)}
.ptag{font-size:8px;font-weight:700;font-family:var(--mono);width:18px;flex-shrink:0}
.proj-row.rd .ptag{color:var(--RD)}
.proj-row.pd .ptag{color:var(--PD)}
.pi{background:transparent;border:none;color:var(--text2);font-family:var(--mono);
  font-size:10px;width:30px;text-align:center;padding:0;outline:none}
.pi:focus{color:var(--text);background:var(--bg4);border-radius:2px}
.pi.rd:focus{color:var(--RD)}
.pi.pd:focus{color:var(--PD)}

/* week footer */
.wk-foot{background:var(--bg3);border-top:1px solid var(--border);
  padding:5px 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:10px}
.ci{background:var(--bg4);border:1px solid var(--border2);color:var(--text2);
  padding:1px 5px;border-radius:3px;font-size:11px;font-family:var(--mono);width:46px;text-align:center}
.ci:focus{outline:none;border-color:var(--abd);color:var(--text)}
.tots{margin-left:auto;display:flex;gap:7px;font-family:var(--mono);font-size:10px;flex-wrap:wrap}
.ti2{display:flex;gap:2px}.tl{color:var(--text3)}
.ca{color:var(--amber)}.cg{color:var(--green)}.cr{color:var(--red)}
.ct{color:var(--teal)}.cp{color:var(--purple)}.cb{color:var(--blue)}
.crd{color:var(--RD)}.cpd{color:var(--PD)}.cm{color:var(--text3)}

/* ── PIN screen ─────────────────────────────── */
#pin-screen{position:fixed;inset:0;background:var(--bg1);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:20px;}
#pin-screen.hidden{display:none;}
.pin-logo{font-family:var(--mono);font-size:42px;font-weight:700;color:var(--amber);
  letter-spacing:4px;line-height:1;}
.pin-sub{font-size:10px;color:var(--text3);font-family:var(--mono);letter-spacing:2px;
  text-transform:uppercase;margin-top:-12px;}
.pin-dots{display:flex;gap:14px;margin:12px 0 4px;}
.pin-dot{width:10px;height:10px;border-radius:50%;background:transparent;
  border:1px solid var(--border2);transition:background .15s,border-color .15s;}
.pin-dot.filled{background:var(--amber);border-color:var(--amber);}
.pin-pad{display:grid;grid-template-columns:repeat(3,64px);gap:6px;}
.pin-key{height:52px;border-radius:4px;background:transparent;border:1px solid var(--border2);
  color:var(--text2);font-size:20px;font-family:var(--mono);cursor:pointer;
  transition:background .1s,color .1s;letter-spacing:1px;}
.pin-key:hover{background:var(--bg3);color:var(--text1);}
.pin-key:active{background:var(--bg4);}
.pin-err{font-size:10px;color:#f87171;font-family:var(--mono);height:14px;
  text-align:center;letter-spacing:1px;}
.pin-change{font-size:10px;color:var(--text3);font-family:var(--mono);
  cursor:pointer;letter-spacing:1px;margin-top:8px;opacity:.5;}
.pin-change:hover{opacity:1;}
</style>
</head>
<body>
<div id="pin-screen">
  <div class="pin-logo">E3</div>
  <div class="pin-sub">SDL Timesheets</div>
  <div class="pin-dots">
    <div class="pin-dot" id="pd0"></div>
    <div class="pin-dot" id="pd1"></div>
    <div class="pin-dot" id="pd2"></div>
    <div class="pin-dot" id="pd3"></div>
  </div>
  <div class="pin-pad">
    <button class="pin-key" onclick="pinKey('1')">1</button>
    <button class="pin-key" onclick="pinKey('2')">2</button>
    <button class="pin-key" onclick="pinKey('3')">3</button>
    <button class="pin-key" onclick="pinKey('4')">4</button>
    <button class="pin-key" onclick="pinKey('5')">5</button>
    <button class="pin-key" onclick="pinKey('6')">6</button>
    <button class="pin-key" onclick="pinKey('7')">7</button>
    <button class="pin-key" onclick="pinKey('8')">8</button>
    <button class="pin-key" onclick="pinKey('9')">9</button>
    <button class="pin-key" onclick="pinKey('')" style="font-size:13px">⌫</button>
    <button class="pin-key" onclick="pinKey('0')">0</button>
    <button class="pin-key" onclick="pinKey(null)" style="font-size:13px">✕</button>
  </div>
  <div class="pin-err" id="pin-err"></div>
  <div class="pin-change" onclick="pinChangeMode()" id="pin-change-btn">change pin</div>
</div>
<div id="app" style="display:none">
<div id="hdr">
  <div class="logo"><span>E3</span> SDL Timesheets</div>
  <button class="btn btn-now" onclick="jumpToday()">Go to today</button>
  <div class="yr-btns" id="yr-btns"></div>
  <div class="hdr-right">
    <button class="btn" onclick="toggleTheme()" id="btn-theme">&#9790;</button>
    <button class="btn" onclick="addYear()">+ Year</button>
    <button class="btn" onclick="exportCSV()">Export CSV</button>
    <button class="btn" id="btn-save" onclick="saveFile()" style="border-color:rgba(34,197,94,.4);color:#22c55e">&#8659; Save file</button>
  </div>
</div>

<div id="main">
  <div class="hero-grid" id="hero"></div>
  <div class="stats-grid" id="stats"></div>
  <div class="chart-box"><div class="chart-c"><canvas id="chart"></canvas></div>
    <div class="chart-leg">
      <div class="leg"><div class="leg-dot" style="background:var(--amber)"></div>Over contract</div>
      <div class="leg"><div class="leg-dot" style="background:var(--green)"></div>Under contract</div>
      <div class="leg"><div class="leg-dot" style="background:var(--RD)"></div>R&amp;D</div>
      <div class="leg"><div class="leg-dot" style="background:var(--PD)"></div>PD</div>
      <div class="leg"><div class="leg-dot" style="background:var(--teal)"></div>Holiday</div>
      <div class="leg"><div class="leg-dot" style="background:var(--purple)"></div>Planning</div>
      <div class="leg"><div class="leg-dot" style="border:1px dashed rgba(150,160,180,.6);background:transparent"></div>Contracted</div>
    </div>
  </div>
  <div class="wk-section-hdr" id="sec-hdr"></div>
  <div id="weeks"></div>
</div>

<script>
const SK='e3ts_v13';
const sv=s=>{try{localStorage.setItem(SK,JSON.stringify(s))}catch(e){}};
const ld=()=>{try{const r=localStorage.getItem(SK);if(r)return JSON.parse(r)}catch(e){}return null};

function isoWeek(d){
  // Simple, correct ISO week: Thursday of the week determines the year
  const t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const day=t.getUTCDay()||7;       // Mon=1 .. Sun=7
  t.setUTCDate(t.getUTCDate()+4-day); // shift to Thursday of this week
  const y=t.getUTCFullYear();
  const jan1=new Date(Date.UTC(y,0,1));
  const w=Math.ceil(((t-jan1)/864e5+1)/7);
  return[y,w];
}
function mondayOf(y,w){
  const s=new Date(y,0,1+(w-1)*7);const dow=s.getDay();
  if(dow<=4)s.setDate(s.getDate()-dow+1);else s.setDate(s.getDate()+8-dow);
  return s;
}
function weeksInYear(y){return isoWeek(new Date(y,11,28))[1];}
function fd(d){return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'})}
function mD(m){if(!m)return null;const d=Math.abs(m)/420;return(d%1?d.toFixed(1):d.toFixed(0))+'d';}

const TODAY=new Date();
const[TOD_Y,TOD_W]=isoWeek(TODAY);
const TOD_ISO=TODAY.toISOString().slice(0,10);

function normaliseTime(s){
  // Accept 830, 0830, 1700, 930, 8, 17 as well as 08:30
  if(!s)return '';
  s=s.trim().replace(/[^0-9:]/g,'');
  if(!s)return '';
  if(s.includes(':')){
    // already has colon — validate and return as-is
    return s;
  }
  // digits only
  if(s.length<=2){
    // treat as hours only: 8 → 08:00, 17 → 17:00
    return s.padStart(2,'0')+':00';
  }
  if(s.length===3){
    // 830 → 08:30
    return '0'+s[0]+':'+s.slice(1);
  }
  // 4 digits: 1700 → 17:00, 0830 → 08:30
  return s.slice(0,2)+':'+s.slice(2,4);
}
function toM(s){
  if(!s)return null;
  s=normaliseTime(s);
  const m=s.trim().match(/^(\d{1,2}):(\d{2})$/);
  if(!m)return null;
  const h=+m[1],mn=+m[2];
  if(h>30||mn>59)return null;
  return h*60+mn;
}
function fm(m){
  if(m==null)return'—';
  const neg=m<0,a=Math.abs(m);
  return(neg?'-':'')+Math.floor(a/60)+':'+(a%60<10?'0':'')+(a%60);
}
function calcDay(s,b,e){
  const sm=toM(s),bm=toM(b)??0,em=toM(e);
  if(sm==null||em==null)return null;
  let d=em-sm-bm;if(d<-60)d+=1440;return d;
}
function parsePH(v){
  if(!v)return null;
  // Normalise shorthand (830→08:30, 4→04:00) before parsing
  v=normaliseTime(String(v).trim());
  const m=v.match(/^(\d+):(\d{2})$/);
  if(m)return+m[1]*60+(+m[2]);
  const n=parseFloat(v);
  if(!isNaN(n)&&n>=0)return Math.round(n*60);
  return null;

// State always loaded from SEED in the file — localStorage used only as
// a fast cache for unsaved edits within the same session.
// On open, we check if the file's SEED is newer than the cache by comparing
// a generation key. If SEED has changed (new save), we use SEED.
const SEED_KEY='e3seed_'+btoa(JSON.stringify(SEED)).slice(-16);
let S=null;
const cached=ld();
if(cached&&localStorage.getItem('e3seed_key')===SEED_KEY){
  S=cached; // same session, use cache
} else {
  // Fresh open or new file version — load from SEED
  S={activeYear:String(Math.max(...Object.keys(SEED).map(Number))),years:{}};
  Object.entries(SEED).forEach(([yr,wks])=>{
    const weeks={};
    Object.entries(wks).forEach(([wn,wd])=>{
      weeks[+wn]={contractMins:wd.contractMins,days:wd.days.map(d=>({
        date:d.date,start:d.start||'',brk:d.brk||'',end:d.end||'',flag:d.flag||'',rd:d.rd||'',pd:d.pd||''
      }))};
    });
    S.years[+yr]={weeks};
  });
  sv(S);
  try{localStorage.setItem('e3seed_key',SEED_KEY);}catch(e){}
}
if(false){// (dead block — kept for structure parity)
  // Migrate missing fields
  let dirty=false;
  Object.values(S.years).forEach(yd=>Object.values(yd.weeks).forEach(w=>w.days.forEach(d=>{
    if(d.rd===undefined){d.rd='';dirty=true;}
    if(d.pd===undefined){d.pd='';dirty=true;}
  })));
  if(dirty)sv(S);
}

function weekTotals(yr,wn){
  const w=S.years[yr]?.weeks[wn];if(!w)return null;
  let worked=0,holiday=0,planned=0,hasData=false,rd=0,pd=0;
  const dayMins=Math.round((w.contractMins??2100)/5);
  w.days.forEach(d=>{
    const f=d.flag||'';
    if(f==='holiday'){holiday+=dayMins;hasData=true;return;}
    const m=calcDay(d.start,d.brk,d.end);
    if(m!=null){
      if(f==='planning')planned+=m;else{worked+=m;hasData=true;}
    }
    const r=parsePH(d.rd);if(r)rd+=r;
    const p=parsePH(d.pd);if(p)pd+=p;
  });
  const contract=w.contractMins??2100,logged=worked+holiday;
  return{worked,holiday,planned,contract,hasData,logged,remaining:contract-logged,rd,pd};
}

function renderStats(){
  const yr=+S.activeYear,yd=S.years[yr];
  let tw=0,th=0,nw=0,ex=0;
  Object.keys(yd.weeks).forEach(wn=>{
    const t=weekTotals(yr,+wn);if(!t||!t.hasData)return;
    tw+=t.worked;th+=t.holiday;nw++;if(t.logged>t.contract)ex+=t.logged-t.contract;
  });
  document.getElementById('stats').innerHTML=`
    <div class="scard"><div class="scard-lbl">Total worked</div><div class="scard-val ca">${fm(tw)}</div><div class="scard-sub">${nw} weeks</div></div>
    <div class="scard"><div class="scard-lbl">Holiday taken</div><div class="scard-val ct">${fm(th)}</div><div class="scard-sub">${mD(th)||'0d'} @ 7h</div></div>

    <div class="scard"><div class="scard-lbl">Total excess</div><div class="scard-val ${ex>0?'cr':'cg'}">${ex>0?'+':''}${fm(ex)}</div><div class="scard-sub">over contract</div></div>`;
}

let _chart=null;
function renderChart(){
  const yr=+S.activeYear,yd=S.years[yr];
  const wks=Object.keys(yd.weeks).sort((a,b)=>+a-+b);
  const labels=[],workedBase=[],rdData=[],pdData=[],holidayData=[],planningData=[],contractData=[],wc=[];
  wks.forEach(wn=>{
    const t=weekTotals(yr,+wn);
    const isFut=yr>TOD_Y||(yr===TOD_Y&&+wn>TOD_W);
    if(!t||(!t.hasData&&t.planned===0&&!isFut))return;
    labels.push('W'+wn);
    const workedH=+(t.worked/60).toFixed(2);
    let rdH=+(t.rd/60).toFixed(2);
    let pdH=+(t.pd/60).toFixed(2);
    // If worked but no project split at all, assume 100% PD
    if(t.worked>0&&t.rd===0&&t.pd===0){
      pdH=workedH;rdH=0;
    }
    // If only one side filled, other = remainder
    else if(t.worked>0&&t.rd>0&&t.pd===0){
      pdH=+Math.max(0,workedH-rdH).toFixed(2);
    }
    else if(t.worked>0&&t.pd>0&&t.rd===0){
      rdH=+Math.max(0,workedH-pdH).toFixed(2);
    }
    // base = any worked not accounted for by project hours (rounding slack)
    const base=+Math.max(0,workedH-rdH-pdH).toFixed(2);
    workedBase.push(base||null);
    rdData.push(rdH||null);
    pdData.push(pdH||null);
    holidayData.push(t.holiday?+(t.holiday/60).toFixed(2):null);
    planningData.push(t.planned?+(t.planned/60).toFixed(2):null);
    contractData.push(+(t.contract/60).toFixed(2));
    const isNow=yr===TOD_Y&&+wn===TOD_W;
    const total=t.worked+t.holiday;
    wc.push(`rgba(${total>t.contract?'240,165,0':'34,197,94'},${isNow?1:.7})`);
  });
  const canvas=document.getElementById('chart');if(!canvas)return;
  if(_chart){_chart.destroy();_chart=null;}

const DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

function renderWeek(yr,wn){
  const w=S.years[yr]?.weeks[wn];if(!w)return'';
  const isCur=yr===TOD_Y&&wn===TOD_W;
  const mon=mondayOf(yr,wn);const sun=new Date(mon);sun.setDate(mon.getDate()+6);
  const t=weekTotals(yr,wn);
  const delta=t?t.logged-t.contract:0;
  const dCls=delta>10?'cr':delta<-10?'ca':'cm';
  const sumStr=t?.hasData?(t.remaining<=0?`+${fm(-t.remaining)} excess`:`${fm(t.remaining)} left`):'';

  const ths=w.days.map((d,di)=>{
    const isW=di>=5,isN=d.date===TOD_ISO;
    const dt=new Date(d.date+'T12:00');
    return`<th class="dhd${isW?' wknd':''}${isN?' today':''}">${DAYS[di]}<br><span style="font-weight:400;opacity:.7;font-size:9px">${dt.getDate()} ${dt.toLocaleString('default',{month:'short'})}</span></th>`;
  }).join('');

  function inpRow(key,ph){
    return w.days.map((d,di)=>{
      const isW=di>=5,isN=d.date===TOD_ISO;
      const f=d.flag||'';
      const isH=f==='holiday',isP=f==='planning';
      const fcls=isH?' fl-hol':isP?' fl-plan':'';
      const icls=isH?' hol':isP?' plan':'';
      let content;
      if(isH&&key!=='start'){
        content=`<span style="font-size:9px;color:var(--teal);opacity:.4">${key==='brk'?'hol':''}</span>`;
      } else {
        content=`<input class="ti${icls}" id="i-${yr}-${wn}-${di}-${key}" value="${d[key]||''}" placeholder="${ph}" maxlength="5" autocomplete="off">`;
      }
      return`<td class="dtd${isW?' wknd':''}${isN?' today':''}${fcls}">${content}</td>`;
    }).join('');
  }

  const flagRow=w.days.map((d,di)=>{
    const isW=di>=5,isN=d.date===TOD_ISO;
    const f=d.flag||'';
    return`<td class="dtd${isW?' wknd':''}${isN?' today':''}" style="background:var(--bg3)">
      <div style="display:flex;gap:2px;justify-content:center">

        <button class="fl${f==='planning'?' plan':''}" onclick="cycleFlag(${yr},${wn},${di},'planning')">P</button>
      </div></td>`;

  const projRow=w.days.map((d,di)=>{
    const isW=di>=5,isN=d.date===TOD_ISO;
    const f=d.flag||'';
    if(f==='holiday'||f==='planning'){
      return`<td class="dtd${isW?' wknd':''}${isN?' today':''}" style="opacity:.3;text-align:center;font-size:9px;color:var(--text3)">—</td>`;
    }
    return`<td class="dtd proj-td${isW?' wknd':''}${isN?' today':''}">
      <div class="proj-pair">
        <div class="proj-row rd"><span class="ptag">R&D</span><input class="pi rd" id="prd-${yr}-${wn}-${di}" value="${d.rd||''}" placeholder="—" maxlength="5" autocomplete="off"></div>
        <div class="proj-row pd"><span class="ptag">PD</span><input class="pi pd" id="ppd-${yr}-${wn}-${di}" value="${d.pd||''}" placeholder="—" maxlength="5" autocomplete="off"></div>
      </div></td>`;
  }).join('');

  const hrsRow=w.days.map((d,di)=>{
    const isW=di>=5,isN=d.date===TOD_ISO;
    const f=d.flag||'';
    let m,cls;
    if(f==='holiday'){m=Math.round((w.contractMins??2100)/5);cls='hol';}
    else{m=calcDay(d.start,d.brk,d.end);cls=m==null?'mt':f==='planning'?'plan':m<0?'neg':'pos';}
    return`<td class="dtd${isW?' wknd':''}${isN?' today':''}">
      <span class="hrs ${cls}" id="hrs-${yr}-${wn}-${di}">${m!=null?fm(m):'—'}</span></td>`;
  }).join('');

  const projMini=(t?.rd||t?.pd)?`<div class="wk-proj-mini">
    ${t.rd?`<span class="crd">R${fm(t.rd)}</span>`:''}${t.pd?`<span class="cpd">P${fm(t.pd)}</span>`:''}</div>`:'';

  return`<div class="wk${isCur?' now':''}" id="wk-${yr}-${wn}">
  <div class="wk-hdr" onclick="toggleWk(${yr},${wn})">
    <span class="chv" id="chv-${yr}-${wn}">&#9660;</span>

  <div class="wk-body" id="wkb-${yr}-${wn}"><div class="tbl-wrap"><table class="wt">
    <thead><tr><th class="rlbl"></th>${ths}</tr></thead>

    </tbody>
  </table></div>
  <div class="wk-foot">
    <span class="cm" style="font-size:10px">Contract</span>
    <input class="ci" type="number" id="ci-${yr}-${wn}" value="${Math.round((w.contractMins??2100)/60)}" min="0" max="80" step="1" onchange="setContract(${yr},${wn},this.value)"> <span class="cm" style="font-size:10px">h</span>

      ${t?.planned?`<div class="ti2"><span class="tl">plan</span><span class="cp">${fm(t.planned)}</span></div>`:''}
      <div class="ti2"><span class="tl">ctr</span><span class="cb">${fm(t?.contract)}</span></div>
      <div class="ti2"><span class="tl">&#916;</span><span class="${dCls}">${t?(delta>=0?'+':'')+fm(delta):'—'}</span></div>
      ${t?.rd?`<div class="ti2"><span class="crd">R&D</span><span class="cm">${fm(t.rd)}</span></div>`:''}
      ${t?.pd?`<div class="ti2"><span class="cpd">PD</span><span class="cm">${fm(t.pd)}</span></div>`:''}
    </div>
  </div>
</div></div>`;
}

function saveDay(yr,wn,di,key,val){
  // Normalise time on save so stored value is always HH:MM
  const norm=normaliseTime(val);
  const canonical=toM(norm)!=null?( ()=>{const t=toM(norm);return Math.floor(t/60).toString().padStart(2,'0')+':'+(t%60).toString().padStart(2,'0');} )():val;
  S.years[yr].weeks[wn].days[di][key]=canonical;sv(S);
  // Update the input to show normalised value
  const inp=document.getElementById('i-'+yr+'-'+wn+'-'+di+'-'+key);
  if(inp&&inp!==document.activeElement)inp.value=canonical;
  patchHrs(yr,wn,di);patchSum(yr,wn);
  renderHero();renderStats();renderChart();
}
function saveProjH(yr,wn,di,proj,val){
  const d=S.years[yr].weeks[wn].days[di];
  const w=S.years[yr].weeks[wn];
  // Normalise input (830→08:30) before storing
  const normVal=normaliseTime(val);
  const parsedMins=parsePH(normVal);
  const canonical=parsedMins!=null
    ?(Math.floor(parsedMins/60).toString().padStart(2,'0')+':'+(parsedMins%60).toString().padStart(2,'0'))
    :val;
  d[proj]=canonical;
  // Update this input to show normalised value
  const thisInp=document.getElementById('p'+proj+'-'+yr+'-'+wn+'-'+di);
  if(thisInp&&thisInp!==document.activeElement)thisInp.value=canonical;
  // Auto-fill the other project field = day total - this field
  const dayMins=calcDay(d.start,d.brk,d.end);
  const enteredMins=parsePH(val);
  if(dayMins!=null&&enteredMins!=null&&enteredMins<=dayMins){
    const other=proj==='rd'?'pd':'rd';
    const otherMins=dayMins-enteredMins;
    const otherFmt=Math.floor(otherMins/60).toString().padStart(2,'0')+':'+(otherMins%60).toString().padStart(2,'0');
    d[other]=otherFmt;
    // Update the other input's displayed value
    const otherId='p'+other+'-'+yr+'-'+wn+'-'+di;
    const otherInp=document.getElementById(otherId);
    if(otherInp&&otherInp!==document.activeElement)otherInp.value=otherFmt;
  }
  sv(S);
  patchSum(yr,wn);renderHero();renderStats();renderChart();
}
function cycleFlag(yr,wn,di,flag){
  const d=S.years[yr].weeks[wn].days[di];
  d.flag=(d.flag===flag?'':flag);sv(S);
  // Re-render just this week — simpler than patching td backgrounds
  const container=document.getElementById(`wk-${yr}-${wn}`);
  if(container){
    const newHtml=renderWeek(yr,wn);
    container.outerHTML=newHtml;
    attachListeners(yr,wn);
  }
  patchSum(yr,wn);renderHero();renderStats();renderChart();
}
function setContract(yr,wn,val){
  S.years[yr].weeks[wn].contractMins=Math.round((parseFloat(val)||0)*60);sv(S);
  patchSum(yr,wn);renderHero();renderStats();renderChart();
}

function attachListeners(yr,wn){
  const KEYS=['start','brk','end'];
  const order=[];
  for(let di=0;di<7;di++)for(const k of KEYS)order.push(`i-${yr}-${wn}-${di}-${k}`);
  for(let di=0;di<7;di++){
    for(const key of KEYS){
      const id=`i-${yr}-${wn}-${di}-${key}`;
      const inp=document.getElementById(id);if(!inp)continue;
      inp.addEventListener('input',e=>saveDay(yr,wn,di,key,e.target.value));
      inp.addEventListener('change',e=>saveDay(yr,wn,di,key,e.target.value));
      inp.addEventListener('keydown',e=>{
        if(e.key!=='Enter')return;
        e.preventDefault();saveDay(yr,wn,di,key,inp.value);
        const idx=order.indexOf(id);
        for(let i=idx+1;i<order.length;i++){
          const nx=document.getElementById(order[i]);
          if(nx){nx.focus();nx.select();break;}
        }
      });
    }
    for(const proj of['rd','pd']){
      const pid='p'+proj+'-'+yr+'-'+wn+'-'+di;
      const pinp=document.getElementById(pid);if(!pinp)continue;
      pinp.addEventListener('input',e=>saveProjH(yr,wn,di,proj,e.target.value));
      pinp.addEventListener('change',e=>saveProjH(yr,wn,di,proj,e.target.value));
      pinp.addEventListener('keydown',e=>{
        if(e.key==='Tab'){
          // Tab within same day: RD->PD, PD->next day RD
          // (browser handles this naturally with tabIndex, but Enter also moves)
        }
        if(e.key!=='Enter')return;
        e.preventDefault();saveProjH(yr,wn,di,proj,pinp.value);
        const nid=proj==='rd'?('ppd-'+yr+'-'+wn+'-'+di):('prd-'+yr+'-'+wn+'-'+(di+1));
        const nx=document.getElementById(nid);if(nx){nx.focus();nx.select();}
      });
    }
  }
  patchSum(yr,wn);
}

function toggleWk(yr,wn){
  const b=document.getElementById('wkb-'+yr+'-'+wn);
  const c=document.getElementById('chv-'+yr+'-'+wn);
  if(!b)return;
  const closing=!b.classList.contains('closed');
  b.classList.toggle('closed',closing);
  if(c)c.textContent=closing?'▶':'▼';
}
function openWk(yr,wn){
  const b=document.getElementById('wkb-'+yr+'-'+wn);
  const c=document.getElementById('chv-'+yr+'-'+wn);
  if(b)b.classList.remove('closed');
  if(c)c.textContent='▼';
}
function closeWk(yr,wn){
  const b=document.getElementById('wkb-'+yr+'-'+wn);
  const c=document.getElementById('chv-'+yr+'-'+wn);
  if(b)b.classList.add('closed');
  if(c)c.textContent='▶';
}

function jumpToday(){
  if(String(S.activeYear)!==String(TOD_Y)){
    S.activeYear=String(TOD_Y);sv(S);
    renderAll();
  }
  openWk(TOD_Y,TOD_W);
  const el=document.getElementById('wk-'+TOD_Y+'-'+TOD_W);
  if(!el)return;
  const hdrH=document.getElementById('hdr').offsetHeight;
  // Walk offsetParent chain for true absolute position — works in any container
  let absTop=0,node=el;
  while(node){absTop+=node.offsetTop;node=node.offsetParent;}
  // Try all possible scroll roots
  for(const root of[document.scrollingElement,document.documentElement,document.body]){
    if(root&&root.scrollHeight>root.clientHeight){
      root.scrollTop=Math.max(0,absTop-hdrH-8);
      break;
    }
  }
  const inp=el.querySelector('input.ti');
  if(inp){inp.focus();inp.select();}
}

function addYear(){
  const nxt=Math.max(...Object.keys(S.years).map(Number))+1;
  const h=prompt(`Add ${nxt} — weekly contracted hours?`,'35');if(h===null)return;
  const hrs=parseFloat(h)||35,n=weeksInYear(nxt),weeks={};
  for(let w=1;w<=n;w++){
    const mon=mondayOf(nxt,w);
    weeks[w]={contractMins:Math.round(hrs*60),days:Array.from({length:7},(_,d)=>{
      const dt=new Date(mon);dt.setDate(mon.getDate()+d);
      return{date:dt.toISOString().slice(0,10),start:'',brk:'',end:'',flag:'',rd:'',pd:''};
    })};
  }
  S.years[nxt]={weeks};S.activeYear=String(nxt);sv(S);renderAll();
}

const _H2="\n<\/body>\n<\/html>";

function buildHtml(){
  let src=null;
  for(const s of document.scripts){
    if(s.textContent.includes('const SEED=')){src=s.textContent;break;}
  }
  if(!src)return null;
  const stateData={};
  Object.entries(S.years).forEach(([yr,yd])=>{
    stateData[yr]={};
    Object.entries(yd.weeks).forEach(([wn,w])=>{stateData[yr][wn]=w;});
  });
  const newSeed=JSON.stringify(stateData);
  const marker='const SEED=';
  const si=src.indexOf(marker);
  const ei=src.indexOf(';\n',si);
  if(si===-1||ei===-1)return null;
  const newScript=src.slice(0,si)+marker+newSeed+src.slice(ei);
  return _H1+'<script>\n'+newScript+'\n<\/script>'+_H2;
}

async function saveFile(){
  const html=buildHtml();
  if(!html){alert('Could not build file content');return;}
  const btn=document.getElementById('btn-save');

  // ── Option 1: File System Access API (Chrome/Edge, works from disk or SharePoint)
  if(window.showSaveFilePicker){
    try{
      // Reuse existing handle if we have one, else prompt once
      if(!_fileHandle){
        _fileHandle=await window.showSaveFilePicker({
          suggestedName:'SDL_Timesheets.html',
          types:[{description:'HTML file',accept:{'text/html':['.html']}}]
        });
      }
      const writable=await _fileHandle.createWritable();
      await writable.write(html);
      await writable.close();
      if(btn){btn.textContent='Saved ✓';setTimeout(()=>{btn.textContent='Save file';},1500);}
      return;
    }catch(e){
      if(e.name==='AbortError')return; // user cancelled picker — don't fall through
      // Any other error (e.g. handle became stale): clear handle and fall through to download
      _fileHandle=null;
    }
  }

  // ── Option 2: Plain download fallback (Firefox, Safari, opened via http without FSAA)
  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='SDL_Timesheets.html';
  a.click();
  URL.revokeObjectURL(a.href);
  if(btn){btn.textContent='Saved ✓';setTimeout(()=>{btn.textContent='Save file';},1500);}
}
function exportCSV(){
  const yr=+S.activeYear,yd=S.years[yr];
  const rows=['Week,Date,Day,Start,Break,End,Hours,Flag,RD,PD,Contract'];
  const D2=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  Object.keys(yd.weeks).sort((a,b)=>+a-+b).forEach(wn=>{
    yd.weeks[wn].days.forEach((d,di)=>{
      const m=calcDay(d.start,d.brk,d.end);
      rows.push([wn,d.date,D2[di],d.start||'',d.brk||'',d.end||'',m!=null?fm(m):'',
        d.flag||'',d.rd||'',d.pd||'',(yd.weeks[wn].contractMins/60).toFixed(1)].join(','));
    });
  });
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(rows.join('\n'));
  a.download=`timesheets_${yr}.csv`;a.click();
}

function renderAll(){
  renderYearBtns();
  const yr=+S.activeYear;
  document.getElementById('sec-hdr').textContent=yr+' — all weeks';
  renderHero();renderStats();renderChart();
  const wc=document.getElementById('weeks');
  wc.innerHTML=Object.keys(S.years[yr].weeks).sort((a,b)=>+a-+b).map(wn=>renderWeek(yr,+wn)).join('');

// renderAll() is called by pinUnlock() after PIN entry
// ── PIN ──────────────────────────────────────────────────────────────────────
const PIN_KEY='e3pin_v1';
const DEFAULT_PIN='1234';
let _pinBuf='';
let _pinChangeMode=false;
let _pinNewFirst='';

function pinHash(p){
  // Simple non-crypto hash — good enough for a privacy screen, not security
  let h=0;for(let i=0;i<p.length;i++){h=(Math.imul(31,h)+p.charCodeAt(i))|0;}
  return String(h>>>0);
}

function pinStored(){
  try{return localStorage.getItem(PIN_KEY)||pinHash(DEFAULT_PIN);}catch(e){return pinHash(DEFAULT_PIN);}
}

function pinSave(p){
  try{localStorage.setItem(PIN_KEY,pinHash(p));}catch(e){}
}

function pinUpdateDots(){
  for(let i=0;i<4;i++){
    const d=document.getElementById('pd'+i);
    if(d)d.classList.toggle('filled',i<_pinBuf.length);
  }
}

function pinSetErr(msg){
  const el=document.getElementById('pin-err');
  if(el)el.textContent=msg;
}

function pinSetSub(msg){
  const el=document.querySelector('.pin-sub');
  if(el)el.textContent=msg;
}

let _appReady=false;
function pinUnlock(){
  const ps=document.getElementById('pin-screen');
  const app=document.getElementById('app');
  // Show app first (hidden but in layout) so Chart.js can measure canvas
  if(app){app.style.display='';}
  if(!_appReady){_appReady=true;renderAll();}
  ps.style.opacity='0';
  ps.style.transition='opacity .25s';
  setTimeout(()=>{
    ps.classList.add('hidden');
    ps.style.opacity='';
    ps.style.transition='';
  },240);
  _pinBuf='';
}

function pinKey(k){
  const errEl=document.getElementById('pin-err');
  if(errEl)errEl.textContent='';

  if(k===null){
    // ✕ = cancel change mode
    _pinChangeMode=false;_pinNewFirst='';_pinBuf='';
    pinUpdateDots();
    pinSetSub('SDL Timesheets');
    document.getElementById('pin-change-btn').textContent='change pin';
    return;
  }
  if(k===''){
    // backspace
    _pinBuf=_pinBuf.slice(0,-1);
    pinUpdateDots();
    return;
  }
  if(_pinBuf.length>=4)return;
  _pinBuf+=k;
  pinUpdateDots();

  if(_pinBuf.length<4)return;

  if(_pinChangeMode){
    if(!_pinNewFirst){
      // First entry of new PIN
      _pinNewFirst=_pinBuf;
      _pinBuf='';
      pinUpdateDots();
      pinSetSub('confirm new pin');
    } else {
      // Confirm
      if(_pinBuf===_pinNewFirst){
        pinSave(_pinBuf);
        _pinChangeMode=false;_pinNewFirst='';
        pinSetSub('SDL Timesheets');
        document.getElementById('pin-change-btn').textContent='change pin';
        pinSetErr('pin updated');
        setTimeout(()=>{pinSetErr('');pinUnlock();},800);
      } else {
        pinSetErr('pins did not match');
        _pinBuf='';_pinNewFirst='';
        pinUpdateDots();
        pinSetSub('enter new pin');
      }
    }
    return;
  }

  // Normal unlock
  if(pinHash(_pinBuf)===pinStored()){
    pinUnlock();
  } else {
    pinSetErr('incorrect pin');
    _pinBuf='';
    pinUpdateDots();
  }
}

function pinChangeMode(){
  _pinChangeMode=true;_pinNewFirst='';_pinBuf='';
  pinUpdateDots();
  pinSetSub('enter new pin');
  document.getElementById('pin-change-btn').textContent='cancel';
}

// Keyboard support
document.addEventListener('keydown',e=>{
  const ps=document.getElementById('pin-screen');
  if(ps&&!ps.classList.contains('hidden')){
    if(e.key>='0'&&e.key<='9')pinKey(e.key);
    else if(e.key==='Backspace')pinKey('');
    else if(e.key==='Escape')pinKey(null);
  }
});
